<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Stopwatch App</title>
  <link rel="stylesheet" href="stylestop.css" />
  <style>
    .welcome-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .welcome-container h1 {
      font-size: 36px;
      color: #007bff;
    }

    .welcome-container p {
      font-size: 18px;
      color: #333;
      margin: 20px 0;
    }

    .enter-button {
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background-color: #28a745;
      color: white;
    }

    .enter-button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <h1>Welcome to the Stopwatch Web App</h1>
    <p>Track your time effortlessly with our simple and elegant stopwatch.</p>
    <a href="stopwatch.html">
      <button class="enter-button">Enter Stopwatch</button>
    </a>
  </div>
</body>
</html>
